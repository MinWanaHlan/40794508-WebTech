<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangman Game</title>
    <link rel="stylesheet" href="style.css" />
    <script src="scripts/word-list.js" defer></script>
    <script src="scripts/scripts.js" defer></script>
  </head>
  <body>
    <button id="muteBtn" class="mute-btn">🔊</button>
    <div class="game-modal">
      <div class="content">
        <img src="images/lost.gif" alt="gif" />
        <h4 class="modal-title">Game Over!</h4>
        <p class="result-text">
          The correct word was: <b>rainbow</b>
        </p>
        <h4 class="final-score">
          Final Score: <b>0</b>
        </h4>
        <div class="modal-buttons">
            <button class="play-again">🔄 Play Again</button>
            <button class="view-ranking">🏆 View Ranking</button>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="hangman-box">
        <img src="images/hangman-0.svg" alt="hangman-img" />
        <h1>Hangman Game</h1>
      </div>
      <div class="game-box">
        <ul class="word-display"></ul>
        <h4 class="hint-text">
          Hint:
          <b>afnkajf afnakjfn afonalfn onelknf afnaalnf aflknakf.</b>
        </h4>
        <h4 class="guesses-text">
          Incorrect gussess:
          <b>0 / 6</b>
        </h4>
        <div class="score-mode">
          <h4 class="score-text">
            Score: <b>0</b>
          </h4>
          <h4 class="mode-text">
            Mode: <b id="mode-value">Easy</b>
          </h4>
        </div>
        <div class="game-controls">
          <button id="restart-btn">Restart</button>
          <button id="newword-btn">New Word</button>
          <button id="intro-btn">Back to Choose Difficulty</button>
        </div>
        <div class="keyboard"></div>
      </div>
    </div>
    <script src="scripts/music.js"></script>
  </body>
</html>
