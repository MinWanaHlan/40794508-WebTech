<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Login</title>
<link rel="stylesheet" href="intro.css">
<audio id="bgMusic" autoplay loop>
    <source src="sounds/backgroundsound.mp3" type="audio/mp3">
</audio>
</head>

<body>

<div class="intro-container">

    <img src="images/Logo.png" alt="Hangman Logo" class="logo">

    <h1 class="title">Player Login</h1>

    <p class="description">Enter your name to start</p>

    <input type="text" id="playerName" placeholder="Enter your name" 
           style="padding:10px; width:80%; margin-bottom:20px;">

    <div class="button-group">
        <button id="startGame">Continue</button>
    </div>

</div>

<script src="scripts/player.js"></script>

</body>
</html>
