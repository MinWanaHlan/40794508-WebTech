<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Difficulty - Hangman</title>
    <link rel="stylesheet" href="difficulty.css">
</head>
<body>

<div class="difficulty-container">

    <img src="images/logo.png" class="difficulty-logo">

    <h1>Select Difficulty</h1>

    <p>Choose your challenge level</p>

    <div class="difficulty-buttons">

        <button class="easy" data-level="easy">Easy</button>

        <button class="medium" data-level="medium">Medium</button>

        <button class="hard" data-level="hard">Hard</button>

    </div>

    <button class="back-btn" id="backBtn">Back to MainMenu</button>

</div>


<script src="scripts/music.js"></script> 
<script src="scripts/difficulty.js"></script>

</body>
</html>
